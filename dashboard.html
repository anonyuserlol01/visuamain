<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · Creative House</title>
<link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png">
<link rel="stylesheet" href="app.css">
</head>
<body>
<div class="grain" aria-hidden="true"></div>

<header class="appbar">
  <div class="brand-wrap"><a href="https://visuarealmstudios.com" class="brand">VISUA<span>REALM</span></a><span class="sub">Creative House</span></div>
  <nav>
    <a href="admin.html" id="admin-link" class="navlink" style="display:none;">Admin</a>
    <span class="avatar" id="nav-avatar">·</span>
    <button id="logout" class="navlink">Log out</button>
  </nav>
</header>

<div class="wrap">
  <div class="alert" id="alert"></div>

  <div class="hero-band">
    <div><span class="eyebrow" id="hello">Welcome</span><h1 class="page" id="member-name">Your Studio</h1></div>
  </div>

  <div class="panel" style="margin-top:24px;">
    <div class="spread">
      <div>
        <div class="mono muted" style="font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;">Profile completeness</div>
        <div style="margin-top:10px;width:min(360px,60vw);"><div class="progress"><i id="pc-bar"></i></div></div>
      </div>
      <div class="mono" style="font-size:1.6rem;font-family:var(--font-impact);" id="pc-pct">0%</div>
    </div>
  </div>

  <div class="tabs section-gap">
    <button class="tab active" data-tab="openings">Open Positions</button>
    <button class="tab" data-tab="apps">My Applications</button>
    <button class="tab" data-tab="profile">My Profile</button>
  </div>

  <!-- OPENINGS -->
  <section id="tab-openings">
    <div id="openings-list"><div class="empty"><span class="loader"></span> Loading positions…</div></div>
  </section>

  <!-- APPLICATIONS -->
  <section id="tab-apps" style="display:none;">
    <div id="apps-list"><div class="empty"><span class="loader"></span> Loading…</div></div>
  </section>

  <!-- PROFILE -->
  <section id="tab-profile" style="display:none;">
    <form id="profile-form" class="panel">
      <div class="grid two">
        <label class="f"><span class="lab">Full name</span><input id="p-name" type="text"></label>
        <label class="f"><span class="lab">City</span><input id="p-city" type="text" placeholder="Toronto, ON"></label>
      </div>
      <div class="grid two">
        <label class="f"><span class="lab">Phone</span><input id="p-phone" type="tel"></label>
        <label class="f"><span class="lab">Headline</span><input id="p-headline" type="text" placeholder="Emerging Cinematographer"></label>
      </div>
      <div class="grid two">
        <label class="f"><span class="lab">Primary department</span><select id="p-dept"></select></label>
        <label class="f"><span class="lab">Experience level</span>
          <select id="p-exp"><option>Emerging</option><option>Intermediate</option><option>Experienced</option></select></label>
      </div>
      <label class="f"><span class="lab">Skills (comma separated)</span><input id="p-skills" type="text" placeholder="Lighting, Colour, Editing"></label>
      <label class="f"><span class="lab">Short bio</span><textarea id="p-bio" placeholder="Tell the house who you are and what you want to make."></textarea></label>
      <label class="f"><span class="lab">Availability</span><input id="p-avail" type="text" placeholder="Weekends, or from June 2026"></label>

      <div class="split"></div>
      <h2 class="block">Links</h2>
      <div class="grid two">
        <label class="f"><span class="lab">IMDb</span><input id="p-imdb" type="url" placeholder="https://imdb.com/name/…"></label>
        <label class="f"><span class="lab">Instagram</span><input id="p-insta" type="url" placeholder="https://instagram.com/…"></label>
      </div>
      <div class="grid two">
        <label class="f"><span class="lab">Website / Portfolio</span><input id="p-web" type="url"></label>
        <label class="f"><span class="lab">Showreel</span><input id="p-reel" type="url" placeholder="Vimeo / YouTube"></label>
      </div>

      <div class="split"></div>
      <h2 class="block">Files</h2>
      <div class="grid two">
        <label class="f"><span class="lab">Resume / CV</span><input id="p-resume" type="file" accept=".pdf,.doc,.docx"><span class="hint" id="resume-status"></span></label>
        <label class="f"><span class="lab">Profile photo</span><input id="p-avatar" type="file" accept="image/*"><span class="hint" id="avatar-status"></span></label>
      </div>

      <button class="btn solid" type="submit" id="save-btn">Save Profile</button>
    </form>
  </section>
</div>

<!-- APPLY MODAL -->
<div class="modal-bg" id="apply-modal">
  <div class="modal">
    <h3 id="apply-title">Apply</h3>
    <p class="muted mono" style="font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;margin-bottom:20px;" id="apply-meta"></p>
    <div class="alert" id="apply-alert"></div>
    <form id="apply-form">
      <label class="f"><span class="lab">Why you? (cover note)</span><textarea id="a-note" placeholder="A few honest lines about why this role, and what you bring." required></textarea></label>
      <label class="f"><span class="lab">Portfolio link for this role (optional)</span><input id="a-link" type="url" placeholder="Best relevant work"></label>
      <div class="spread">
        <button type="button" class="btn ghost sm" id="apply-cancel">Cancel</button>
        <button type="submit" class="btn solid" id="apply-submit">Submit Application</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
<script>
const DEPARTMENTS = ["Directing","Producing","Writing","Cinematography","Camera","Lighting","Grip","Production Design","Wardrobe","Hair & Makeup","Editing","Colour","Sound","Music","Photography","Graphic Design","Motion Graphics","Marketing","Social Media","Behind The Scenes","Actor","Production Assistant","Assistant Director","VFX","Animation","Development","Other"];

(async function(){
  const alertEl = document.getElementById('alert');
  if(!CH.guardConfig('.wrap')) return;
  const session = await CH.requireAuth();
  if(!session) return;
  const uid = session.user.id;

  document.getElementById('logout').addEventListener('click', ()=>CH.signOut());

  // populate department select
  const deptSel = document.getElementById('p-dept');
  deptSel.innerHTML = '<option value="">Select…</option>' + DEPARTMENTS.map(d=>`<option>${d}</option>`).join('');

  // load profile
  let profile = await CH.profile();
  if(profile && profile.is_admin) document.getElementById('admin-link').style.display='inline-block';
  fillProfile(profile);
  updateCompleteness(profile);

  document.getElementById('member-name').textContent = (profile && profile.full_name) ? profile.full_name : 'Your Studio';
  (function(){var n=(profile&&profile.full_name)?profile.full_name.trim():''; var i=n?n.split(/\s+/).map(w=>w[0]).slice(0,2).join(''):'?'; var av=document.getElementById('nav-avatar'); if(av) av.textContent=i.toUpperCase();})();
  document.getElementById('hello').textContent = 'Welcome' + ((profile && profile.full_name) ? (', ' + profile.full_name.split(' ')[0]) : '');

  // ---------- TABS ----------
  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    ['openings','apps','profile'].forEach(n=>document.getElementById('tab-'+n).style.display='none');
    document.getElementById('tab-'+t.dataset.tab).style.display='block';
  }));

  // ---------- PROFILE ----------
  function fillProfile(p){
    if(!p) return;
    const L = p.links||{};
    set('p-name',p.full_name); set('p-city',p.city); set('p-phone',p.phone);
    set('p-headline',p.headline); set('p-bio',p.bio); set('p-avail',p.availability);
    set('p-skills',(p.skills||[]).join(', '));
    if(p.primary_department) deptSel.value=p.primary_department;
    if(p.experience_level) document.getElementById('p-exp').value=p.experience_level;
    set('p-imdb',L.imdb); set('p-insta',L.instagram); set('p-web',L.website); set('p-reel',L.reel);
    if(p.resume_url) document.getElementById('resume-status').textContent='On file ✓';
    if(p.avatar_url) document.getElementById('avatar-status').textContent='On file ✓';
  }
  function set(id,v){ const el=document.getElementById(id); if(el) el.value=v||''; }

  function updateCompleteness(p){
    if(!p){return;}
    const fields=[p.full_name,p.city,p.headline,p.bio,p.primary_department,(p.skills&&p.skills.length),p.availability,(p.links&&(p.links.imdb||p.links.website||p.links.reel))];
    const done=fields.filter(Boolean).length;
    const pct=Math.round(done/fields.length*100);
    document.getElementById('pc-bar').style.width=pct+'%';
    document.getElementById('pc-pct').textContent=pct+'%';
  }

  async function uploadFile(file, kind){
    const ext=(file.name.split('.').pop()||'dat').toLowerCase();
    const path=`${uid}/${kind}-${Date.now()}.${ext}`;
    const { error }=await CH.sb.storage.from('uploads').upload(path,file,{upsert:true});
    if(error) throw error;
    return path;
  }

  document.getElementById('profile-form').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const btn=document.getElementById('save-btn'); btn.disabled=true; btn.innerHTML='<span class="loader"></span>';
    try{
      const resumeFile=document.getElementById('p-resume').files[0];
      const avatarFile=document.getElementById('p-avatar').files[0];
      let resume_url=profile?profile.resume_url:null;
      let avatar_url=profile?profile.avatar_url:null;
      if(resumeFile){ resume_url=await uploadFile(resumeFile,'resume'); document.getElementById('resume-status').textContent='Uploaded ✓'; }
      if(avatarFile){ avatar_url=await uploadFile(avatarFile,'avatar'); document.getElementById('avatar-status').textContent='Uploaded ✓'; }

      const skills=val('p-skills').split(',').map(s=>s.trim()).filter(Boolean);
      const payload={
        full_name:val('p-name'), city:val('p-city'), phone:val('p-phone'),
        headline:val('p-headline'), bio:val('p-bio'), availability:val('p-avail'),
        primary_department:deptSel.value, experience_level:document.getElementById('p-exp').value,
        skills,
        links:{ imdb:val('p-imdb'), instagram:val('p-insta'), website:val('p-web'), reel:val('p-reel') },
        resume_url, avatar_url
      };
      const { error }=await CH.sb.from('profiles').update(payload).eq('id',uid);
      if(error) throw error;
      profile={...profile,...payload};
      updateCompleteness(profile);
      document.getElementById('member-name').textContent=payload.full_name||'Your Studio';
      CH.toast(alertEl,'Profile saved.','ok'); window.scrollTo({top:0,behavior:'smooth'});
    }catch(err){ CH.toast(alertEl, err.message||'Could not save.', 'err'); }
    btn.disabled=false; btn.textContent='Save Profile';
  });
  function val(id){ return document.getElementById(id).value.trim(); }

  // ---------- OPENINGS ----------
  const myApps = {}; // opening_id -> status
  async function loadApps(){
    const { data }=await CH.sb.from('applications')
      .select('*, openings(title, department, production_title, status)')
      .eq('applicant_id',uid).order('created_at',{ascending:false});
    (data||[]).forEach(a=>myApps[a.opening_id]=a.status);
    return data||[];
  }

  async function loadOpenings(){
    const { data, error }=await CH.sb.from('openings')
      .select('*').in('status',['open','soon']).order('created_at',{ascending:false});
    const host=document.getElementById('openings-list');
    if(error){ host.innerHTML=`<div class="empty">${CH.esc(error.message)}</div>`; return; }
    if(!data||!data.length){ host.innerHTML='<div class="empty">No open positions right now. Check back soon.</div>'; return; }
    host.innerHTML=data.map(o=>{
      const applied=myApps[o.id];
      const isOpen=o.status==='open';
      const action = applied
        ? `<span class="mono muted" style="font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;">Applied · ${CH.esc(applied)}</span>`
        : isOpen
          ? `<button class="btn solid sm apply-btn" data-id="${o.id}" data-title="${CH.esc(o.title)}" data-meta="${CH.esc([o.department,o.production_title,o.location].filter(Boolean).join(' · '))}">Apply</button>`
          : `<span class="pill soon">Opening soon</span>`;
      return `<div class="panel pcard ${isOpen?'live':''}">
        <div class="spread">
          <div style="max-width:70%;">
            <div class="spread" style="justify-content:flex-start;gap:12px;">
              <h2 class="block" style="margin:0;">${CH.esc(o.title)}</h2>${CH.pill(o.status)}
            </div>
            <div class="row" style="border:none;padding:8px 0 0;">
              <div class="m">${CH.esc([o.department,o.production_title,o.kind].filter(Boolean).join(' · '))}</div>
            </div>
            ${o.description?`<p class="lead" style="margin-top:10px;">${CH.esc(o.description)}</p>`:''}
            <div class="tags" style="margin-top:14px;">
              ${o.location?`<span class="tag">${CH.esc(o.location)}</span>`:''}
              ${o.commitment?`<span class="tag">${CH.esc(o.commitment)}</span>`:''}
              ${o.closes_at?`<span class="tag">Closes ${CH.fmtDate(o.closes_at)}</span>`:''}
            </div>
          </div>
          <div>${action}</div>
        </div>
      </div>`;
    }).join('');
    document.querySelectorAll('.apply-btn').forEach(b=>b.addEventListener('click',()=>openApply(b.dataset.id,b.dataset.title,b.dataset.meta)));
  }

  // ---------- APPLY MODAL ----------
  const modal=document.getElementById('apply-modal');
  let applyingTo=null;
  function openApply(id,title,meta){
    applyingTo=id;
    document.getElementById('apply-title').textContent='Apply · '+title;
    document.getElementById('apply-meta').textContent=meta||'';
    document.getElementById('a-note').value=''; document.getElementById('a-link').value='';
    CH.clearToast(document.getElementById('apply-alert'));
    modal.classList.add('show');
  }
  document.getElementById('apply-cancel').addEventListener('click',()=>modal.classList.remove('show'));
  modal.addEventListener('click',(e)=>{ if(e.target===modal) modal.classList.remove('show'); });

  document.getElementById('apply-form').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const a=document.getElementById('apply-alert');
    const btn=document.getElementById('apply-submit'); btn.disabled=true; btn.innerHTML='<span class="loader"></span>';
    const { error }=await CH.sb.from('applications').insert({
      opening_id:applyingTo, applicant_id:uid,
      cover_note:document.getElementById('a-note').value.trim(),
      portfolio_link:document.getElementById('a-link').value.trim()||null
    });
    btn.disabled=false; btn.textContent='Submit Application';
    if(error){
      CH.toast(a, error.code==='23505'?'You have already applied to this position.':error.message, 'err'); return;
    }
    myApps[applyingTo]='submitted';
    modal.classList.remove('show');
    CH.toast(alertEl,'Application submitted. Good luck.','ok');
    window.scrollTo({top:0,behavior:'smooth'});
    loadOpenings(); renderApps();
  });

  // ---------- MY APPLICATIONS ----------
  let appsCache=[];
  function renderApps(){
    const host=document.getElementById('apps-list');
    if(!appsCache.length){ host.innerHTML='<div class="empty">No applications yet. Browse open positions to apply.</div>'; return; }
    host.innerHTML='<div class="list">'+appsCache.map(a=>{
      const o=a.openings||{};
      return `<div class="row">
        <div><div class="t">${CH.esc(o.title||'Position')}</div>
          <div class="m">${CH.esc([o.department,o.production_title].filter(Boolean).join(' · '))} · Applied ${CH.fmtDate(a.created_at)}</div></div>
        <div>${CH.pill(a.status)}</div>
      </div>`;
    }).join('')+'</div>';
  }

  // initial loads
  appsCache = await loadApps();
  await loadOpenings();
  renderApps();
})();
</script>
</body>
</html>
