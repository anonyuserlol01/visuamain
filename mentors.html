<!DOCTYPE html>
<html lang="en">
<head>
<style>html.master-checking body{visibility:hidden!important}</style><script>document.documentElement.classList.add('master-checking');setTimeout(()=>document.documentElement.classList.remove('master-checking'),6000)</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentors | Creative House</title>
<link rel="icon" type="image/png" sizes="32x32" href="/Images/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/Images/apple-touch-icon.png">
<link rel="stylesheet" href="/app.css">
</head>
<body class="app">
<div class="grain" aria-hidden="true"></div>
<header class="appbar">
  <div class="brand-wrap"><button class="backbtn" title="Go back"><span class="ar">&larr;</span> Back</button><a href="/creative-house" class="brand">VISUA<span>REALM</span></a><span class="sub">Mentors</span></div>
  <nav><a href="/creative-house/" class="navlink">The House</a><a href="/pricing/" class="navlink">Pricing</a><a href="/dashboard/" class="navlink">Dashboard</a><button id="logout" class="navlink">Log out</button></nav>
</header>

<div class="wrap" id="app" style="display:none;">
  <div class="alert" id="alert"></div>
  <div class="hero-band"><div><span class="eyebrow" style="color:var(--mentor);">Community Mentors</span>
    <h1 class="page">People Who've Been There</h1>
    <p class="lead" style="margin-top:12px;max-width:60ch;">Experienced members who've offered to help emerging creatives find their feet. No hierarchy, no gatekeeping — just people willing to share what they know.</p></div></div>

  <div class="filters section-gap">
    <div class="frow" id="disc-chips"></div>
    <div class="frow selects">
      <select id="f-city"></select>
      <select id="f-avail"><option value="Any">Any availability</option><option>Available</option><option>Limited</option></select>
      <input class="searchbox" id="f-q" placeholder="Search name, craft, skills…">
    </div>
  </div>
  <div id="mentor-list"><div class="empty"><span class="loader"></span> Finding mentors…</div></div>
</div>

<!-- MENTOR PANEL -->
<div class="modal-bg" id="m-modal"><div class="modal">
  <button class="modal-close" id="m-x">&times;</button>
  <div id="m-body"></div>
</div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/config.js"></script>
<script src="/master-gate.js"></script>
<script src="/app.js"></script>
<script>
(async function(){
  const alertEl=document.getElementById('alert');
  if(!CH.guardConfig('body')) return;
  const session=await CH.requireAuth(); if(!session) return;
  document.getElementById('logout').addEventListener('click',()=>CH.signOut());
  const me=await CH.profile(); if(!CH.enforceAccount(me)) return;
  try{const {data:cfg}=await CH.sb.from('app_settings').select('maintenance_active,maintenance_message').eq('id',1).maybeSingle(); if(!CH.enforceMaintenance(me,cfg||{})) return;}catch(e){}
  document.getElementById('app').style.display='block';

  let F={disc:'All',city:'Any',avail:'Any',q:''};
  document.getElementById('disc-chips').innerHTML=['All',...CH.DISCIPLINES].map(d=>`<button class="chip ${d===F.disc?'on':''}" data-d="${d}">${d}</button>`).join('');
  document.getElementById('f-city').innerHTML=['Any',...CH.CITIES].map(c=>`<option>${c}</option>`).join('');
  document.querySelectorAll('#disc-chips .chip').forEach(c=>c.addEventListener('click',()=>{F.disc=c.dataset.d;document.querySelectorAll('#disc-chips .chip').forEach(x=>x.classList.toggle('on',x.dataset.d===F.disc));draw();}));
  document.getElementById('f-city').addEventListener('change',e=>{F.city=e.target.value;draw();});
  document.getElementById('f-avail').addEventListener('change',e=>{F.avail=e.target.value;draw();});
  document.getElementById('f-q').addEventListener('input',e=>{F.q=e.target.value;draw();});

  const {data}=await CH.sb.from('profiles').select('*').eq('is_mentor',true);
  window.__mentors=(data||[]).filter(m=>m.profile_public!==false);
  const mMap={};window.__mentors.forEach(m=>mMap[m.id]=m);

  function draw(){
    let list=(window.__mentors||[]).slice();
    if(F.disc!=='All') list=list.filter(m=>m.discipline===F.disc);
    if(F.city!=='Any') list=list.filter(m=>(m.city||'Toronto')===F.city);
    if(F.avail!=='Any') list=list.filter(m=>(m.availability||'').toLowerCase().includes(F.avail.toLowerCase()));
    if(F.q){const q=F.q.toLowerCase();list=list.filter(m=>[m.full_name,m.primary_department,m.headline,m.mentor_bio,(m.mentor_specialties||[]).join(' '),(m.skills||[]).join(' ')].some(x=>(x||'').toLowerCase().includes(q)));}
    const host=document.getElementById('mentor-list');
    if(!list.length){host.innerHTML='<div class="empty">No mentors match yet. Mentors are appointed by the Creative House team — check back as the community grows.</div>';return;}
    host.innerHTML='<div class="mentor-grid">'+list.map(m=>`
      <div class="mentor-card" data-id="${m.id}">
        <div class="mc-name">${CH.mentorStar()} ${CH.esc(m.full_name||'Mentor')}</div>
        <div class="mc-role">${CH.esc(m.primary_department||m.discipline||'')} · ${CH.esc(m.city||'Toronto')}</div>
        ${m.mentor_bio||m.headline?`<p class="lead" style="margin:12px 0 0;font-size:.92rem;">${CH.esc((m.mentor_bio||m.headline||'').slice(0,120))}${(m.mentor_bio||m.headline||'').length>120?'…':''}</p>`:''}
        <div class="tags" style="margin-top:12px;">${(m.mentor_specialties||m.specialties||[]).slice(0,3).map(s=>`<span class="tag">${CH.esc(s)}</span>`).join('')}</div>
        <button class="btn ghost sm view-m" style="margin-top:16px;">View mentor</button>
      </div>`).join('')+'</div>';
    host.querySelectorAll('.mentor-card').forEach(c=>c.addEventListener('click',(e)=>{if(e.target.closest('.view-m')||e.currentTarget===c)openMentor(c.dataset.id);}));
  }

  const modal=document.getElementById('m-modal');
  function openMentor(id){
    const m=mMap[id],L=m.links||{};
    const contact=m.contact_pref||'Email';
    const contactLink = contact==='Instagram'&&L.instagram ? L.instagram : contact==='Website'&&L.website ? L.website : `mailto:${m.email}`;
    document.getElementById('m-body').innerHTML=`
      <span class="mentor-chip">${CH.mentorStar()} Community Mentor</span>
      <h3 style="margin:14px 0 2px;">${CH.esc(m.full_name||'Mentor')}</h3>
      <p class="mono" style="color:var(--mentor);font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;">${CH.esc(m.primary_department||m.discipline||'')} · ${CH.esc(m.city||'Toronto')}${m.availability?' · '+CH.esc(m.availability):''}</p>
      ${m.mentor_bio||m.bio?`<p style="margin-top:16px;line-height:1.75;">${CH.esc(m.mentor_bio||m.bio)}</p>`:''}
      ${(m.mentor_specialties||[]).length?`<p class="fieldset-title" style="margin-top:20px;">Specialties</p><div class="tags">${(m.mentor_specialties||[]).map(s=>`<span class="tag">${CH.esc(s)}</span>`).join('')}</div>`:''}
      <p class="fieldset-title" style="margin-top:20px;">Portfolio</p>
      <div class="tags">${L.imdb?`<a class="tag" target="_blank" rel="noopener" href="${CH.esc(L.imdb)}">IMDb</a>`:''}${L.website?`<a class="tag" target="_blank" rel="noopener" href="${CH.esc(L.website)}">Website</a>`:''}${L.reel?`<a class="tag" target="_blank" rel="noopener" href="${CH.esc(L.reel)}">Reel</a>`:''}${L.instagram?`<a class="tag" target="_blank" rel="noopener" href="${CH.esc(L.instagram)}">Instagram</a>`:''}${!(L.imdb||L.website||L.reel||L.instagram)?'<span class="muted mono" style="font-size:.66rem;">No links shared.</span>':''}</div>
      <div class="split"></div>
      <a class="btn solid" href="${CH.esc(contactLink)}" target="_blank" rel="noopener">Reach out via ${CH.esc(contact)}</a>
      <p class="hint" style="margin-top:12px;">Be respectful of their time. A clear, kind message goes a long way.</p>`;
    modal.classList.add('show');
  }
  document.getElementById('m-x').addEventListener('click',()=>modal.classList.remove('show'));
  modal.addEventListener('click',e=>{if(e.target===modal)modal.classList.remove('show');});

  draw();
  CH.mountFeedback();
  CH.mountNotifications();
  CH.mountFooter();
  CH.wireBack('/dashboard/');
})();
</script>
</body>
</html>
